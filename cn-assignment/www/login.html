<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - bksysnet@HCMUT</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #0b0f14;
      --panel: #0f1519;
      --muted: rgba(255, 255, 255, 0.55);
      --text: #e6eef6;
      --accent: #00b0ff;
      --accent-2: #ffcc33;
      --soft: rgba(255, 255, 255, 0.03);
      --glass: rgba(255, 255, 255, 0.02);
      --radius: 16px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      color-scheme: dark;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: linear-gradient(180deg, var(--bg), #071018);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .login-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: var(--radius);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
      padding: 36px 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      color: var(--accent-2);
      margin-bottom: 10px;
      text-shadow: 0 0 8px rgba(255, 204, 51, 0.2);
      letter-spacing: 0.6px;
    }

    .input-box {
      position: relative;
      width: 100%;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 44px 12px 14px;
      /* space for icon alignment */
      border-radius: 12px;
      background: var(--soft);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s, background 0.2s;
      box-sizing: border-box;
    }

    input:focus {
      border: 1px solid var(--accent);
      background: rgba(0, 176, 255, 0.06);
    }

    .password-wrapper i {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .password-wrapper i:hover {
      color: var(--accent-2);
    }

    button {
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      color: #021018;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 14px rgba(0, 176, 255, 0.25);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 28px 24px;
      }

      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>
  <form class="login-card" method="POST" action="/login">
    <h1>Login</h1>

    <div class="input-box">
      <input type="text" name="username" placeholder="Username" required>
    </div>

    <div class="input-box password-wrapper">
      <input type="password" name="password" id="password" placeholder="Password" required>
      <i class="fa-solid fa-eye" id="togglePassword"></i>
    </div>

    <button type="submit">Login</button>
  </form>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePassword.classList.toggle('fa-eye-slash');
    });
  </script>
</body>

</html>
