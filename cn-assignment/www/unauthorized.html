<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>401 Unauthorized</title>

    <style>
        :root {
            --bg: #0b0f14;
            --panel: #0f1519;
            --muted: rgba(255, 255, 255, 0.6);
            --text: #e6eef6;
            --accent: #00b0ff;
            --accent-2: #ffcc33;
            --error: #ff4d4d;
            --soft: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.02);
            --radius: 16px;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            color-scheme: dark;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: linear-gradient(180deg, var(--bg), #071018);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .error-box {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            animation: pulseBorder 2.5s infinite;
        }

        @keyframes pulseBorder {

            0%,
            100% {
                box-shadow: 0 0 16px rgba(255, 77, 77, 0.2);
            }

            50% {
                box-shadow: 0 0 22px rgba(255, 77, 77, 0.45);
            }
        }

        h1 {
            font-size: 2.4rem;
            color: var(--error);
            font-weight: 800;
            margin-bottom: 12px;
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.35);
            letter-spacing: 0.6px;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: 1;
                text-shadow: 0 0 10px rgba(255, 77, 77, 0.35);
            }

            45% {
                opacity: 0.9;
                text-shadow: 0 0 14px rgba(255, 77, 77, 0.45);
            }

            50% {
                opacity: 0.8;
            }

            55% {
                opacity: 0.95;
            }
        }

        p {
            color: var(--muted);
            font-size: 1rem;
            margin-bottom: 24px;
        }

        a {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #021018;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }

        a:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(0, 176, 255, 0.25);
        }

        .code {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 18px;
            font-family: monospace;
        }

        @media (max-width: 480px) {
            .error-box {
                padding: 32px 24px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="error-box">
        <h1>401 Unauthorized</h1>
        <p>You do not have permission to access this page.</p>
        <a href="/login">Return to Login</a>
    </div>
</body>

</html>
